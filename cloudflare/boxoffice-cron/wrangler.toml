name = "boxoffice-cron"
main = "worker.js"
compatibility_date = "2025-01-01"
# Cron-only Worker (no HTTP endpoint) — the Cron Trigger fires the scheduled() handler; nothing to serve.
workers_dev = false

# P4 RADAR: fires every 2 MINUTES (news-sentinel pattern). Each firing regex-sweeps the trade feeds for a
# Tier-S breaking box-office story (→ immediate drip dispatch, detection ≤2 min) and on each :00/:30
# boundary sends the regular drip dispatch (limit=2). The P3 pacing governor + MAX_ARTICLES_PER_DAY=20 +
# the accuracy gates shape actual publishing — an ahead-of-pace tick exits in seconds at ~$0, so the
# extra dispatch capacity costs nothing until real supply exists. 720 free invocations/day, zero AI.
[triggers]
crons = ["*/2 * * * *"]

# Non-secret config. GH_REF MUST be the repo's DEFAULT branch (workflow_dispatch only sees workflows on default).
[vars]
GH_OWNER = "thescreenreport68-web"
GH_REPO = "thescreenreport"
GH_REF = "main"

# Secret (NOT here — set once with:  wrangler secret put GH_TOKEN):
#   GH_TOKEN = a fine-grained GitHub PAT scoped to this repo with "Actions: Read and write".
