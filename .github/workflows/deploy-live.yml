name: deploy-live

# THE authoritative deploy (owner 2026-07-06). Every push to `main` (from ANY lane — news, gossip, or a human commit)
# rebuilds the WHOLE site from the very latest main and deploys it to Cloudflare Pages production. This fixes the
# two-lane clobbering bug where a lane building from a STALE checkout overwrote live articles with an incomplete site:
# this workflow always builds COMPLETE latest main, and `cancel-in-progress` means the newest push wins the race.
# Publishing is decoupled from deploying — the news/gossip lanes just commit+push; THIS puts every article live.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one live deploy at a time; a newer push cancels an in-flight build so the freshest complete main always wins.
concurrency:
  group: deploy-live
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      # Belt-and-suspenders: hard-sync to the very latest origin/main so we can NEVER build a stale tree.
      - name: Sync to latest main
        run: git fetch origin main && git reset --hard origin/main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build the complete site
        run: npm run build

      # File-count tripwire (ARCHITECTURE_MIGRATION_PLAN.md): the FREE plan's static-asset
      # ceiling is 20,000 files (verified empirically 2026-07-19 — a 25k manifest is rejected
      # by the API naming the limit). At ~3.09 files/article that's ~6,400 articles. Warn loudly
      # at 15,000 so the owner upgrades to Workers Paid (100k ceiling) BEFORE deploys start failing.
      - name: File-count tripwire
        run: |
          COUNT=$(find out -type f | wc -l)
          echo "out/ file count: $COUNT (free-plan ceiling: 20000)"
          if [ "$COUNT" -ge 15000 ]; then
            echo "::warning title=Approaching the 20k file ceiling::out/ has $COUNT files. Upgrade the Cloudflare account to Workers Paid (100k ceiling) NOW - deploys fail at 20,000."
          fi

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@3 pages deploy out --project-name=thescreenreport --branch=main --commit-dirty=true

      # Phase 1 (ARCHITECTURE_MIGRATION_PLAN.md): refresh the D1 search index so /api/search
      # (tsr-search worker) always reflects the articles just built. Full refresh — cheap at
      # this scale; Phase 2's content store makes it incremental.
      - name: Refresh search index (D1)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/build-search-index.mjs && npx -y wrangler@4 d1 execute tsr-search --remote -y --file=search-index.sql

      # Phase 0 (ARCHITECTURE_MIGRATION_PLAN.md): dual-deploy the SAME out/ to the Workers
      # static-assets target (thescreenreport-site). While the zone route points production at
      # this Worker, Pages above stays deployed in lockstep as the instant rollback target —
      # deleting the route falls production straight back to Pages with identical content.
      - name: Deploy to Workers static assets (production serving target)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4 deploy --config wrangler.workers.jsonc
