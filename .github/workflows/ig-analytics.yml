# YIF LANE — insights collection + weekly learner (plan §5.7). The feedback flywheel:
# collect per-platform post metrics (IG/FB via Zernio, YouTube via Buffer) → insights ledger →
# the Monday learner turns ≥5 scored reels into hookStyle/segment/slot/goal weights that the
# scout + writer consume. LIVE (owner audit 2026-07-16 — the lane is posting 24/7; the flywheel
# runs with it). Kill switch: comment the schedule block or commit site/data/ig/PAUSED.
name: ig-analytics
on:
  schedule:
    - cron: "30 */6 * * *" # every 6h: collect due insight marks (T+3h/24h/72h/7d)
    - cron: "0 8 * * 1" # Mondays: the strategy learner
  workflow_dispatch: {}

concurrency:
  group: ig-lane # shared with ig-reels so the two never race on the ledger commit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: verify-live + collect + learn
        env:
          TSR_SITE: ${{ github.workspace }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }} # YouTube metrics path (flywheel 2026-07-16)
          META_PAGE_TOKEN: ${{ secrets.META_PAGE_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_ID: ${{ secrets.META_IG_ID }}
        run: |
          node pipeline/ig/igrun.mjs --verify || echo "::warning::some scheduled posts failed live verification"
          node pipeline/ig/igrun.mjs --analytics
          if [ "$(date -u +%u)" = "1" ]; then node pipeline/ig/igrun.mjs --learn; fi
      - name: commit ledgers
        if: always()
        env:
          TSR_GH_TOKEN: ${{ secrets.TSR_GH_TOKEN }}
        run: |
          git config user.name "tsr-ig-bot" && git config user.email "bot@thescreenreport.com"
          git add -A data/ig # -A stages all non-ignored ledger changes; no atomic-abort on a missing path (audit)
          if git diff --cached --quiet; then echo "no changes"; exit 0; fi
          git commit -m "ig: insights $(date -u +%FT%H)"
          REMOTE="https://x-access-token:${TSR_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          for i in 1 2 3; do
            git rebase --abort 2>/dev/null || true
            git pull --rebase --autostash "$REMOTE" ${GITHUB_REF_NAME} && git push "$REMOTE" HEAD:${GITHUB_REF_NAME} && exit 0
            sleep $((i * 10))
          done
          echo "::error::insights ledger push failed" && exit 1
