name: news-breaking

# BREAKING FAST PATH (scale-up 2026-07-16): dispatched by the news-cron SENTINEL worker the minute an urgent story
# appears on a top trade feed. Publishes ONE story through the FULL normal gate chain (pipeline/breaking.mjs →
# run.mjs), commits, and dispatches deploy-live. Target: pushed ≤5 min after the trade posts.

on:
  workflow_dispatch:
    inputs:
      url:
        description: "source article URL (from the sentinel)"
        required: true
      title:
        description: "source headline"
        required: true
      cls:
        description: "urgency class S|A"
        required: false
        default: "A"

# SAME group as news-drip: breaking + drip publishes SERIALIZE (never race the queue/ledger commit). Queued, never
# cancelled — a breaking run waits ≤ one drip run, still well inside the latency budget.
concurrency:
  group: news-publish
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  breaking:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Publish breaking story (full gate chain)
        id: brk
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          BREAK_URL: ${{ github.event.inputs.url }}
          BREAK_TITLE: ${{ github.event.inputs.title }}
          BREAK_CLS: ${{ github.event.inputs.cls }}
        run: node pipeline/breaking.mjs

      - name: Commit new article + state
        if: steps.brk.outputs.published != '0' && steps.brk.outputs.published != ''
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add content/articles data/find data/state
          git commit -m "news: breaking — ${{ steps.brk.outputs.slugs }}" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}" && { echo "pushed on attempt $i"; exit 0; }
            echo "push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::error::could not push after 5 attempts"; exit 1

      - name: Deploy live (dispatch deploy-live)
        if: steps.brk.outputs.published != '0' && steps.brk.outputs.published != ''
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-live.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "dispatched deploy-live"
