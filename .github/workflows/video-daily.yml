name: video-daily

# Generates the day's 3 short videos (movies · tv · celebrity) from the newest published articles and
# schedules them to Facebook, Instagram, YouTube and Pinterest at 10am / 2pm / 6pm America/Los_Angeles.
# Publishing is SERVER-SIDE (Buffer/Zernio hold the scheduled posts and fire them) so this job runs ONCE
# per day and exits — the posts still go out with the laptop off.
#
# CLOCK: like the news/gossip lanes, a Cloudflare Worker cron will call this via workflow_dispatch once a
# day (GitHub's own cron is drifty). The `schedule:` block below is a COMMENTED-OUT fallback — left off so
# merging this file never starts auto-posting. Enable it (or wire the Worker) only after a green draft run.
#
# SAFETY: default mode is `draft` — creates drafts on every platform that NEVER publish. Real posting needs
# mode=live (passes --live to the orchestrator, which is otherwise draft-safe by default).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "draft (safe, nothing publishes) or live (real scheduled posts)"
        required: false
        default: "draft"
      category:
        description: "optional single category: movies | tv | celebrity"
        required: false
        default: ""
      only_slug:
        description: "optional: force one article slug (uses its existing video if present, else generates)"
        required: false
        default: ""
      now:
        description: "publish immediately instead of at the slot times (true/false)"
        required: false
        default: "false"
  # ── OWNER: uncomment to enable the daily GitHub-cron fallback AFTER a green live run ──
  # schedule:
  #   - cron: "0 13 * * *"   # 13:00 UTC ≈ 6am PT — generate + schedule the day's 3 posts before the 10am slot

concurrency:
  group: video-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # paths (Linux runner): the checkout IS the `site` repo
      TSR_SITE: ${{ github.workspace }}
      TSR_PYTHON: ${{ github.workspace }}/.venv/bin/python
      TSR_MODELS: ${{ github.workspace }}/.models
      # model + posting secrets
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
      OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
      LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.TSR_GH_TOKEN }}   # host.mjs pushes the MP4 to the public tsr-media repo

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install node deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: System deps (ffmpeg + espeak-ng)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak-ng

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-video-v1-${{ runner.os }}

      - name: Cache Hugging Face (faster-whisper QC model)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-fasterwhisper-tiny-en

      - name: Python venv + deps
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install \
            kokoro-onnx==0.5.0 onnxruntime==1.27.0 numpy==2.5.0 soundfile==0.14.0 \
            opencv-python-headless==4.13.0.92 faster-whisper==1.2.1 curl_cffi==0.15.0 \
            phonemizer-fork==3.3.2 espeakng-loader==0.2.4 pillow==12.3.0

      - name: Cache Kokoro TTS models
        id: kmodels
        uses: actions/cache@v4
        with:
          path: .models
          key: kokoro-models-v1.0

      - name: Download Kokoro models
        if: steps.kmodels.outputs.cache-hit != 'true'
        run: |
          mkdir -p .models
          curl -fsSL -o .models/kokoro-v1.0.onnx https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/kokoro-v1.0.onnx
          curl -fsSL -o .models/voices-v1.0.bin  https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0/voices-v1.0.bin
          ls -lh .models

      - name: Generate + schedule the day's videos
        env:
          IN_MODE: ${{ github.event.inputs.mode }}
          IN_CATEGORY: ${{ github.event.inputs.category }}
          IN_SLUG: ${{ github.event.inputs.only_slug }}
          IN_NOW: ${{ github.event.inputs.now }}
        run: |
          set -euo pipefail
          FLAGS=""
          [ "${IN_MODE:-draft}" = "live" ] && FLAGS="$FLAGS --live"
          [ "${IN_NOW:-false}" = "true" ] && FLAGS="$FLAGS --now"
          [ -n "${IN_CATEGORY:-}" ] && FLAGS="$FLAGS --category=${IN_CATEGORY}"
          [ -n "${IN_SLUG:-}" ] && FLAGS="$FLAGS --slug=${IN_SLUG}"
          echo "orchestrate flags:$FLAGS"
          node pipeline/video/post/orchestrate.mjs $FLAGS
