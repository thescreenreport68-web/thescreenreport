name: boxoffice-drip

# BOX-OFFICE lane — one drip "tick" (plan: BOX_OFFICE_MULTI_AGENT_PLAN.md). A Cloudflare Worker (cloudflare/
# boxoffice-cron) fires every hour at :30 UTC and dispatches this workflow. Each tick runs the agent team for ONE
# article (finder → gatherer + TMDB data → synthesizer → writer ⇄ qa → image → assemble → publish); then, ONLY if
# something published, it commits the article + lane state to main and dispatches deploy-live (the ONE authoritative
# deploy). Same architecture as news-drip / inside-agents so the lanes can never clobber each other.
#
# CLOCK: a Cloudflare Worker Cron Trigger (cloudflare/boxoffice-cron) drives this via workflow_dispatch — GitHub's own
# cron is drifty. The :30 slot sits BETWEEN the other three lanes (news/gossip at :00, reaction at :23) — no collisions.
#
# SELF-LIMITING: borun.mjs caps at MAX_ARTICLES_PER_DAY=20 (≈15 box-office + 5 streaming) and HOLDS anything that
# doesn't clear the accuracy gates — a thin/obscure film is skipped, never mis-published. Also enforces the PAUSED
# kill-switch (data/boxoffice/PAUSED), a per-tick cost cap, per-stage watchdogs, cross-run dedup, and the
# serialization ledger (never reuses an earlier day's box-office numbers).
#
# REQUIRES the same repo Secrets the other lanes use: OPENROUTER_API_KEY, TMDB_READ_TOKEN, TMDB_API_KEY,
# OMDB_API_KEY, LASTFM_API_KEY, (optional) JINA_API_KEY. Must live on the DEFAULT branch (main).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "articles to publish this tick"
        required: false
        default: "1"
      stream:
        description: "streaming-first tick (Netflix Top 10 / trending TV) instead of box-office-first"
        required: false
        default: "false"
      review:
        description: "review mode: hold as an artifact for owner preview (no commit, no deploy)"
        required: false
        default: "false"

# Never let two ticks run at once (no double-post); a running tick finishes before the next starts.
concurrency:
  group: boxoffice-drip
  cancel-in-progress: false

permissions:
  contents: write        # commit the article + lane state back to the repo
  actions: write         # dispatch deploy-live (GITHUB_TOKEN push does NOT trigger workflows, but CAN dispatch)

jobs:
  drip:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # the deploy branch — deploy-live builds main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Publish one article (box-office tick)
        id: tick
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          BOXOFFICE_REVIEW_DIR: ${{ github.event.inputs.review == 'true' && 'data/boxoffice/review' || '' }}
        run: node pipeline/boxoffice/borun.mjs --limit=${{ github.event.inputs.limit || '1' }}${{ github.event.inputs.stream == 'true' && ' --stream' || '' }}${{ github.event.inputs.review == 'true' && ' --review' || '' }}

      - name: Commit article + lane state (published tick)
        if: github.event.inputs.review != 'true' && steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add content/articles data/boxoffice
          git commit -m "boxoffice: publish ${{ steps.tick.outputs.slugs }}" || { echo "nothing to commit"; exit 0; }
          # Other lanes push to main too — rebase onto the latest remote and retry so a concurrent push never fails
          # ours (a failed state-commit would break dedup/serialization and risk a double-post).
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main \
              && git push origin "HEAD:main" && { echo "pushed on attempt $i"; exit 0; }
            echo "push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::error::could not push state after 5 attempts"; exit 1

      # Persist lane state on a zero-publish LIVE tick — the daily-cap counter, dedup/park ledger and the
      # serialization tracker live under data/boxoffice and must survive ticks that held every film on the
      # ephemeral runner. A GITHUB_TOKEN push does NOT trigger deploy-live (GitHub's recursion guard), so this
      # never causes a spurious rebuild — it only checkpoints state.
      - name: Commit lane state only (zero-publish tick)
        if: github.event.inputs.review != 'true' && (steps.tick.outputs.published == '0' || steps.tick.outputs.published == '')
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add data/boxoffice
          git commit -m "boxoffice: tick — lane state (no publish)" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main \
              && git push origin "HEAD:main" && { echo "pushed on attempt $i"; exit 0; }
            echo "state push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::warning::could not push lane state after 5 attempts"

      - name: Upload run report (always — held/failing ticks stay visible)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boxoffice-run-report-${{ github.run_id }}
          path: |
            data/boxoffice/runs/
            data/boxoffice/review/
          if-no-files-found: ignore

      # PUT THE NEW ARTICLE LIVE — dispatch the authoritative deploy-live workflow (rebuilds the COMPLETE latest
      # main → Cloudflare). A push made by GITHUB_TOKEN does NOT trigger deploy-live's `on: push`, so we dispatch it.
      - name: Deploy live (dispatch deploy-live)
        if: github.event.inputs.review != 'true' && steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-live.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "dispatched deploy-live → the new box-office article goes live with the next complete build"
