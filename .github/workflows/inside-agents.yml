name: inside-agents

# INSIDE-STORIES multi-agent lane — one 24/7 tick (plan: INSIDE_MULTI_AGENT_PLAN.md).
# The agent team (finder → gatherer → embed → synthesizer → writer ⇄ qa → image → publish) runs a
# paced batch, commits the articles + state, then dispatches deploy-live (the ONE authoritative
# deploy) — same architecture as news-drip/gossip-drip so the lanes can never clobber each other.
#
# GUARDS built into agentrun.mjs: PAUSED kill-switch file (data/inside/PAUSED), MAX_ARTICLES_PER_DAY,
# MAX_RUN_COST_USD, per-stage watchdogs, cross-run dedup. Per-run cost/token report → data/inside/runs/.
#
# REQUIRES the same repo Secrets the other lanes use: OPENROUTER_API_KEY, TMDB_READ_TOKEN,
# TMDB_API_KEY, OMDB_API_KEY, LASTFM_API_KEY, (optional) JINA_API_KEY.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "max articles this tick"
        required: false
        default: "2"
      review:
        description: "review mode: hold articles as an artifact for owner preview (no commit, no deploy)"
        required: false
        default: "false"
  # ── OWNER: uncomment to enable the 24/7 cron AFTER the dry run is approved ──
  # schedule:
  #   - cron: "23 */2 * * *"   # every 2h at :23 (offset from the news/gossip ticks)

concurrency:
  group: inside-agents
  cancel-in-progress: false   # never two ticks at once (no double-post)

permissions:
  contents: write
  actions: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # the deploy branch — deploy-live builds main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Agent run (find → gather → synthesize → write → qa → image → publish)
        id: tick
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          # SUPPLY 2.0 (owner upgrade 2026-07-17): YouTube Data API v3 — top-liked comments on the
          # story's own trailer/announcement video are the reaction co-spine (X is permanently dead).
          # ~12% of the free daily quota at 12 stories/day. Absent = fail-soft (bsky + pages carry).
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          # Reddit OFFICIAL OAuth (REV 3): keyless reddit is 403 from runner IPs; with these set,
          # discovery + fan-comment anchors go through oauth.reddit.com. Absent = keyless fallback.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          # X/Twitter reaction search (REV 5) — twitterapi.io. Add TWITTERAPI_KEY as a repo secret to
          # enable real tweet search on cloud; absent = page-scan fallback (still finds embedded tweets).
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          # FREE MODE (owner 2026-07-11): no paid Twitter API, no embeds — quotes are text from free
          # Bluesky/page-scan/Reddit. Set both to "0" the moment twitterapi.io credit is funded.
          INSIDE_NO_X: "1"
          INSIDE_NO_EMBEDS: "1"
          INSIDE_PACE_MS: "12000"        # free-tier pacing between stories
          INSIDE_DIAG: "1"               # supply probes + per-story harvest telemetry in the log
          MAX_ARTICLES_PER_DAY: "30"     # owner volume knob
          MAX_RUN_COST_USD: "0.50"       # hard spend cap per tick
          INSIDE_REVIEW_DIR: ${{ github.event.inputs.review == 'true' && 'data/inside/review' || '' }}
        run: node pipeline/inside/agentrun.mjs --limit=${{ github.event.inputs.limit || '2' }}

      - name: Upload run report (always — failing ticks stay visible)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inside-run-report-${{ github.run_id }}
          path: |
            data/inside/runs/
            data/inside/review/
          if-no-files-found: ignore

      # (F1 fix) State commits on EVERY tick — park/dedup counters and the kill-switch live in
      # data/inside and must survive zero-publish ticks on the ephemeral runner. REVIEW mode commits
      # ONLY the state files (the preview ledger — REV 4 no-repeat) — never articles, never the
      # review dir (gitignored anyway); the article exists solely in the run artifact.
      - name: Commit articles + lane state
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          if [ "${{ github.event.inputs.review }}" = "true" ]; then
            git add data/inside/store.json data/inside/last-run.json
          else
            git add content/articles data/inside data/tweets
          fi
          git commit -m "inside: tick — ${{ steps.tick.outputs.slugs || (steps.tick.outputs.updatedSlugs && format('updated {0}', steps.tick.outputs.updatedSlugs)) || 'lane state (park/dedup)' }}" || { echo "nothing to commit"; exit 0; }
          # CONFLICT-PROOF PUSH (ported from news-drip 2026-07-19 — AUTOMATION_REGISTRY §3.25/§3.1).
          # The old loop was a bare pull-rebase-push ×5 with no `rebase --abort`. A conflict on a
          # regenerable state file left the rebase IN PROGRESS, so every later retry hit "unmerged
          # files" and failed too — the job exited 1 and this tick's finished articles died with the
          # ephemeral runner. News lost 2 articles that way before it was fixed here; this lane never
          # got the fix. Now: clear any half-finished rebase first, and auto-resolve conflicts that are
          # ONLY under data/ by keeping what this tick just wrote (during a rebase ours is "theirs").
          # A conflict touching content/articles is NEVER auto-resolved — abort and retry cleanly.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash origin main; then
              git push origin "HEAD:main" && { echo "pushed on attempt $i"; exit 0; }
            else
              UNMERGED=$(git diff --name-only --diff-filter=U || true)
              if [ -n "$UNMERGED" ] && ! echo "$UNMERGED" | grep -qv '^data/'; then
                echo "state-file conflict on: $UNMERGED — keeping this tick's version"
                echo "$UNMERGED" | xargs -r git checkout --theirs --
                echo "$UNMERGED" | xargs -r git add --
                GIT_EDITOR=true git rebase --continue || git rebase --abort 2>/dev/null || true
                git push origin "HEAD:main" && { echo "pushed on attempt $i (state conflict auto-resolved)"; exit 0; }
              else
                [ -n "$UNMERGED" ] && echo "non-state conflict on: $UNMERGED — aborting rebase, will retry"
                git rebase --abort 2>/dev/null || true
              fi
            fi
            echo "push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::error::could not push state after 5 attempts"; exit 1

      - name: Deploy live (dispatch deploy-live)
        # review mode never deploys — the article exists only as the run artifact until the owner approves
        # An UPDATE (one-story-one-URL) rewrites a live article's reaction cards, so it must reach the
        # site exactly like a publish does — gate on either.
        if: github.event.inputs.review != 'true' && ((steps.tick.outputs.published != '0' && steps.tick.outputs.published != '') || (steps.tick.outputs.updated != '0' && steps.tick.outputs.updated != ''))
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-live.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "dispatched deploy-live → the new inside articles go live with the next complete build"
