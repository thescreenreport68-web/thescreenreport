# CARDS lane — BREAKING fast path. Dispatched by the cards-cron Worker's sentinel the
# moment its scoring gate fires (SENTINEL_MODE="live"; Phase 3 runs "shadow" first).
# Same concurrency group as the slot runner: a breaking build may wait a couple of
# minutes behind an in-flight slot build — the honest ≤10-min promise already budgets it,
# and one group means the data/cards ledger never races.
name: cards-breaking
on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON {title, links[], rule, detectedAt} from the sentinel"
        required: true
        type: string

concurrency:
  group: cards-lane
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  breaking:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: package-lock.json }
      - run: npm ci --include=optional
      - name: Build + publish breaking card
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ZERNIO_API_KEY: ${{ secrets.ZERNIO_API_KEY }}
          TSR_GH_TOKEN: ${{ secrets.TSR_GH_TOKEN }}
          IG_GRAPH_TOKEN: ${{ secrets.IG_GRAPH_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          CARDS_LIVE: ${{ vars.CARDS_LIVE }}
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: node pipeline/cards/cardsrun.mjs --breaking "$PAYLOAD"
      - name: Commit state
        if: always()
        run: |
          git config user.name "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add data/cards
          git commit -m "cards: breaking state" || { echo "nothing to commit"; exit 0; }
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}" && exit 0
            echo "push attempt $i lost the race; retrying…"; sleep 5
          done
          echo "::error::could not push state"; exit 1
