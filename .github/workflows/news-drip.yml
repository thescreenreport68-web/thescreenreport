name: news-drip

# One drip "tick": the scheduler gates on LA posting hours (10am-10pm PT), tops up the queue if the fresh backlog is
# low, publishes ONE news article, then (only if something published) commits state + builds + deploys live.
#
# CLOCK: a Cloudflare Worker Cron Trigger (cloudflare/news-cron) fires every ~5 min and calls this via
# workflow_dispatch — GitHub's own cron is drifty. The `schedule:` block below is a COMMENTED-OUT fallback; leave it
# commented until the owner approves the dry run, so merging this file to the default branch never starts auto-posting.
#
# REQUIRES (already used by gossip-drip): repo Secrets OPENROUTER_API_KEY, TMDB_READ_TOKEN, TMDB_API_KEY,
# OMDB_API_KEY, LASTFM_API_KEY, CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID. Must live on the DEFAULT branch (main).

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "articles to publish this tick"
        required: false
        default: "1"
      force:
        description: "bypass the LA-hours gate (publish now, for testing)"
        required: false
        default: "false"
  # ── OWNER: uncomment to enable the GitHub-cron fallback AFTER the dry-run is approved ──
  # schedule:
  #   - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"   # ~every 5 min (belt-and-suspenders vs the Worker clock)

# ONE publish at a time across the whole news lane (drip + breaking share this group, scale-up 2026-07-16): two
# concurrent publishes would race the queue/ledger commit. Queued, never cancelled.
concurrency:
  group: news-publish
  cancel-in-progress: false

permissions:
  contents: write        # to commit the article + dedup/state back to the repo
  actions: write         # to dispatch deploy-live (GITHUB_TOKEN push does NOT trigger workflows, but it CAN dispatch)

jobs:
  drip:
    runs-on: ubuntu-latest
    # BOUNDED RUN (2026-07-19, registry §3.16): `lib/openrouter.mjs` defaults to retries=4 with a 150s
    # abort each, so ONE stalled chat() can burn ~10 min; an article makes 6-7 calls. Combined with
    # `concurrency: news-publish` + `cancel-in-progress: false`, a single hung run would queue every
    # later tick behind it — and GitHub's default kill is 360 MINUTES, so the lane could stall for
    # hours in silence. A normal tick is 1.8-5.6 min (median 2.1), so 20 min is ~4x headroom and still
    # converts an unbounded stall into a bounded, visible failure. A killed run loses only its own
    # unpushed work; the dedup ledger never recorded it, so FIND simply re-finds the topic next tick.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Publish one article (scheduler tick)
        id: tick
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          GSC_KEY_JSON: ${{ secrets.GSC_KEY_JSON }}   # real search demand at FIND time (one cached call/12h; fails open)
          # RELEASE-DAY SURGE (owner 2026-07-17, The Odyssey): governor target raised — "even a hundred, I
          # don't care" — the quality bar still meters actual output; dial back after the release wave.
          PACE_TARGET: "90"
          PACE_DAILY_CAP: "100"
          ENTITY_DAY_CAP: "8"
          PACE_QMIN: "0.55"          # behind-pace bar can relax to the 55th pct (hard floor 48 + all fact guards still absolute)
          FIND_CANDIDATES: "160"
          FIND_QUEUE: "45"
          MIN_BACKLOG: "12"
          # 24/7 posting (owner 2026-07-05): NO LA-hours gate — the cron's 2-hour cadence is what controls timing.
          LA_START: "0"
          LA_END: "24"
        run: node pipeline/scheduler.mjs --limit=${{ github.event.inputs.limit || '1' }}

      - name: Commit new article + state
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add content/articles data/find data/state
          git commit -m "news: publish ${{ steps.tick.outputs.slugs }}" || { echo "nothing to commit"; exit 0; }
          # The GOSSIP lane pushes to this SAME branch — rebase onto the latest remote and retry so a concurrent
          # gossip push never fails ours (a failed state-commit would break dedup and risk a double-post).
          # NOTE (2026-07-06): the commit message intentionally has NO "[skip ci]" so this push TRIGGERS the
          # deploy-live workflow, which rebuilds the COMPLETE site and deploys it. This lane no longer builds/deploys
          # itself — a single authoritative deploy (deploy-live.yml) fixed the two-lane stale-build clobbering.
          # CONFLICT-PROOF PUSH (root-fix 2026-07-19): a rebase conflict on a regenerable STATE file used to
          # abort the whole tick — the articles were written on the ephemeral runner and LOST (a 07-19 tick
          # lost 2 finished articles this way, retrying 5x against a stuck "unmerged files" state). Now: clear
          # any half-finished rebase first, and auto-resolve conflicts that are ONLY under data/ by keeping the
          # version this tick just wrote (during a rebase our commit is "theirs"). A conflict anywhere else
          # (content/articles) is NOT auto-resolved — we abort and retry cleanly.
          for i in 1 2 3 4 5; do
            git rebase --abort 2>/dev/null || true
            if git pull --rebase --autostash origin "${{ github.ref_name }}"; then
              git push origin "HEAD:${{ github.ref_name }}" && { echo "pushed on attempt $i"; exit 0; }
            else
              UNMERGED=$(git diff --name-only --diff-filter=U || true)
              if [ -n "$UNMERGED" ] && ! echo "$UNMERGED" | grep -qv '^data/'; then
                echo "state-file conflict on: $UNMERGED — keeping this tick's version"
                echo "$UNMERGED" | xargs -r git checkout --theirs --
                echo "$UNMERGED" | xargs -r git add --
                GIT_EDITOR=true git rebase --continue || git rebase --abort 2>/dev/null || true
                git push origin "HEAD:${{ github.ref_name }}" && { echo "pushed on attempt $i (state conflict auto-resolved)"; exit 0; }
              else
                [ -n "$UNMERGED" ] && echo "non-state conflict on: $UNMERGED — aborting rebase, will retry"
                git rebase --abort 2>/dev/null || true
              fi
            fi
            echo "push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::error::could not push state after 5 attempts"; exit 1

      # PUT THE NEW ARTICLE LIVE — explicitly dispatch the authoritative deploy-live workflow (2026-07-06).
      # Deploys are centralized in deploy-live.yml (rebuilds the COMPLETE latest main → Cloudflare) so a stale
      # per-lane build can never clobber the live site. NOTE: a push made by GITHUB_TOKEN does NOT trigger an
      # `on: push` workflow (GitHub's recursion guard) — but GITHUB_TOKEN CAN trigger `workflow_dispatch`, so we
      # dispatch deploy-live here instead of relying on the push event.
      - name: Deploy live (dispatch deploy-live)
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-live.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "dispatched deploy-live → it will rebuild + deploy the complete site (this new article included)"
