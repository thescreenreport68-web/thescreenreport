name: gossip-drip

# One drip "tick": the scheduler gates on a ~2h interval (INTERVAL_MIN), tops up the backlog if low, publishes ONE
# gossip article, then (only if something published) commits it to main and dispatches deploy-live to ship it.
#
# BRANCH: everything runs on and pushes to `main` — the ONE deploy branch deploy-live builds. Do NOT point this at
# rebuild-trending-news; that leftover branch is never deployed, so articles pushed there 404 on the live site.
# CLOCK: a Cloudflare Worker Cron Trigger fires hourly and calls this via workflow_dispatch (GitHub's own cron is
# drifty); the interval gate makes ~half of those ticks publish. The `schedule:` block below is a COMMENTED-OUT
# fallback; leave it commented so merging this file never starts auto-posting.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "articles to publish this tick"
        required: false
        default: "1"
      force:
        description: "bypass the ~2h interval gate (post immediately)"
        required: false
        default: "false"
  # ── OWNER: uncomment to enable the GitHub-cron fallback AFTER the dry-run is approved ──
  # schedule:
  #   - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"   # odd-minute, ~every 5 min (belt-and-suspenders)

# Never let two ticks run at once (no double-post); a running tick finishes before the next starts.
concurrency:
  group: gossip-drip
  cancel-in-progress: false

permissions:
  contents: write        # to commit article + dedup/queue state back to the repo
  actions: write         # to dispatch deploy-live (the ONE authoritative deployer) via the API

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main            # the deploy branch — deploy-live builds main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Publish one article (scheduler tick)
        id: tick
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          INTERVAL_MIN: "115"
        run: node pipeline/gossip/scheduler.mjs --limit=${{ github.event.inputs.limit || '1' }} ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit new article + state
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add content/articles data/gossip
          git commit -m "gossip: publish ${{ steps.tick.outputs.slugs }}" || { echo "nothing to commit"; exit 0; }
          # main is the ONE deploy branch. Other lanes push here too — rebase onto the latest origin/main and retry so
          # a concurrent push never fails ours (a failed state-commit would break dedup and risk a double-post).
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main \
              && git push origin "HEAD:main" && { echo "pushed on attempt $i"; exit 0; }
            echo "push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::error::could not push state after 5 attempts"; exit 1

      # ONE authoritative deployer. Don't build/deploy here (that caused the two-lane clobber). Just dispatch
      # deploy-live, which cleanly checks out main → full build → wrangler deploy. A push made with GITHUB_TOKEN
      # can't auto-trigger deploy-live's on:push, so we dispatch it explicitly (same pattern as inside-agents).
      - name: Deploy live (dispatch deploy-live)
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-live.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "dispatched deploy-live → the new gossip article goes live with the next complete build"
