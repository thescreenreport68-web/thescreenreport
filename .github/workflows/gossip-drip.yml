name: gossip-drip

# One drip "tick": the scheduler gates on LA posting hours (10am-10pm PT), tops up the backlog if low, publishes ONE
# gossip article, then (only if something published) commits state + builds + deploys live.
#
# CLOCK: a Cloudflare Worker Cron Trigger fires every ~5 min and calls this via workflow_dispatch (the same reliable
# mechanism the news automation uses — GitHub's own cron is drifty). The `schedule:` block below is a COMMENTED-OUT
# fallback; leave it commented until the owner approves the dry run, so merging this file never starts auto-posting.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "articles to publish this tick"
        required: false
        default: "1"
      force:
        description: "bypass the ~2h interval gate (post immediately)"
        required: false
        default: "false"
  # ── OWNER: uncomment to enable the GitHub-cron fallback AFTER the dry-run is approved ──
  # schedule:
  #   - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"   # odd-minute, ~every 5 min (belt-and-suspenders)

# Never let two ticks run at once (no double-post); a running tick finishes before the next starts.
concurrency:
  group: gossip-drip
  cancel-in-progress: false

permissions:
  contents: write        # to commit article + dedup/queue state back to the repo

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Publish one article (scheduler tick)
        id: tick
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          INTERVAL_MIN: "115"
        run: node pipeline/gossip/scheduler.mjs --limit=${{ github.event.inputs.limit || '1' }} ${{ github.event.inputs.force == 'true' && '--force' || '' }}

      - name: Commit new article + state
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: |
          git config user.name  "screenreport-bot"
          git config user.email "bot@thescreenreport.com"
          git add content/articles data/gossip
          git commit -m "gossip: publish ${{ steps.tick.outputs.slugs }} [skip ci]" || { echo "nothing to commit"; exit 0; }
          # Other lanes/sessions push to this same branch — rebase onto the latest remote and retry so a concurrent
          # push never fails ours (a failed state-commit would break dedup and risk a double-post).
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin "${{ github.ref_name }}" \
              && git push origin "HEAD:${{ github.ref_name }}" && { echo "pushed on attempt $i"; exit 0; }
            echo "push attempt $i lost the race; retrying in 5s…"; sleep 5
          done
          echo "::error::could not push state after 5 attempts"; exit 1

      - name: Build
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.tick.outputs.published != '0' && steps.tick.outputs.published != ''
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@3 pages deploy out --project-name=thescreenreport --branch=main --commit-dirty=true
